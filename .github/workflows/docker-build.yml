name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/kubesecure-app:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/kubesecure-app:latest