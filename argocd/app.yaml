apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kubesecure-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/milandrah/kubesecure-app.git
    targetRevision: main
    path: kubesecure-chart

  destination:
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true